services:
  - type: web
    name: propmanager-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: propmanager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: propmanager-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://propmanager-backend.onrender.com/api

databases:
  - name: propmanager-db
    plan: starter
